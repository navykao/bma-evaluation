<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | ระบบประเมินผลการฝึกอบรม</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      fontFamily: { sans: ['Sarabun', 'sans-serif'], serif: ['Noto Serif Thai', 'serif'] },
      colors: { primary: { 500: '#b91c3c', 600: '#8B1538', 700: '#6B0F2A' } }
    }}
  }
</script>
<style>
  body { font-family: 'Sarabun', sans-serif; }
  .font-serif { font-family: 'Noto Serif Thai', serif; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .fade-in { animation: fadeIn 0.4s; }
</style>
</head>
<body class="bg-slate-50">

<!-- ========== CONFIG ========== -->
<script>
  // 🔧 แก้ไข URL เป็น Apps Script Web App URL
 const API_URL = 'https://script.google.com/macros/s/AKfycbwbSFYyNAiYnem2xWybRCh1baobfLprA35_bk4595K6SNkHJVoD8L7j72EPXJM9Qcc/exec';
</script>

<div id="app"></div>

<script>
const state = {
  authenticated: false,
  adminKey: '',
  loading: false,
  tab: 'overview',
  stats: null,
  rawData: { self: [], supervisor: [], satisfaction: [] },
  error: null
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

async function login() {
  const key = document.getElementById('adminKey').value.trim();
  if (!key) {
    setState({ error: 'กรุณาใส่รหัส Admin Key' });
    return;
  }

  setState({ loading: true, error: null });

  try {
    // โหลดสถิติก่อน (ไม่ต้องใช้ key)
    const statsRes = await fetch(`${API_URL}?action=getStats`);
    const statsData = await statsRes.json();

    if (statsData.status !== 'success') throw new Error('ไม่สามารถโหลดข้อมูลได้');

    // ลองโหลดข้อมูลดิบด้วย key
    const [selfRes, supRes, satRes] = await Promise.all([
      fetch(`${API_URL}?action=getData&type=self&key=${encodeURIComponent(key)}`),
      fetch(`${API_URL}?action=getData&type=supervisor&key=${encodeURIComponent(key)}`),
      fetch(`${API_URL}?action=getData&type=satisfaction&key=${encodeURIComponent(key)}`)
    ]);

    const selfData = await selfRes.json();
    const supData = await supRes.json();
    const satData = await satRes.json();

    if (selfData.status === 'error') {
      throw new Error('รหัส Admin Key ไม่ถูกต้อง');
    }

    setState({
      authenticated: true,
      adminKey: key,
      loading: false,
      stats: statsData.stats,
      rawData: {
        self: selfData.data || [],
        supervisor: supData.data || [],
        satisfaction: satData.data || []
      }
    });

    // Render charts after DOM updated
    setTimeout(renderCharts, 100);
  } catch (err) {
    setState({ loading: false, error: err.message });
  }
}

async function refreshData() {
  if (!state.adminKey) return;
  setState({ loading: true });

  try {
    const statsRes = await fetch(`${API_URL}?action=getStats`);
    const statsData = await statsRes.json();

    const [selfRes, supRes, satRes] = await Promise.all([
      fetch(`${API_URL}?action=getData&type=self&key=${encodeURIComponent(state.adminKey)}`),
      fetch(`${API_URL}?action=getData&type=supervisor&key=${encodeURIComponent(state.adminKey)}`),
      fetch(`${API_URL}?action=getData&type=satisfaction&key=${encodeURIComponent(state.adminKey)}`)
    ]);

    setState({
      loading: false,
      stats: statsData.stats,
      rawData: {
        self: (await selfRes.json()).data || [],
        supervisor: (await supRes.json()).data || [],
        satisfaction: (await satRes.json()).data || []
      }
    });
    setTimeout(renderCharts, 100);
  } catch (err) {
    setState({ loading: false, error: err.message });
  }
}

function changeTab(tab) {
  setState({ tab });
  setTimeout(renderCharts, 100);
}

function exportCSV(type) {
  const data = state.rawData[type];
  if (!data || data.length === 0) {
    alert('ไม่มีข้อมูลให้ส่งออก');
    return;
  }
  const keys = Object.keys(data[0]);
  const csv = [
    keys.join(','),
    ...data.map(row => keys.map(k => `"${(row[k] || '').toString().replace(/"/g, '""')}"`).join(','))
  ].join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${type}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ============ Charts ============
let charts = {};

function renderCharts() {
  if (!state.stats) return;

  // Destroy existing charts
  Object.values(charts).forEach(c => c?.destroy());
  charts = {};

  // Batch Chart
  const batchEl = document.getElementById('batchChart');
  if (batchEl && state.stats.by_batch) {
    charts.batch = new Chart(batchEl, {
      type: 'bar',
      data: {
        labels: state.stats.by_batch.map(b => b.batch),
        datasets: [
          { label: 'ประเมินตนเอง', data: state.stats.by_batch.map(b => b.self), backgroundColor: '#8B1538', borderRadius: 4 },
          { label: 'หัวหน้าประเมิน', data: state.stats.by_batch.map(b => b.supervisor), backgroundColor: '#D97706', borderRadius: 4 },
          { label: 'ความพึงพอใจ', data: state.stats.by_batch.map(b => b.satisfaction), backgroundColor: '#059669', borderRadius: 4 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom' } },
        scales: { y: { beginAtZero: true } }
      }
    });
  }

  // Radar Chart
  const radarEl = document.getElementById('radarChart');
  if (radarEl && state.stats.averages) {
    charts.radar = new Chart(radarEl, {
      type: 'radar',
      data: {
        labels: ['ความรู้', 'ทักษะ', 'พฤติกรรม', 'ประสิทธิภาพ', 'ความพึงพอใจ'],
        datasets: [{
          label: 'คะแนนเฉลี่ย',
          data: [
            state.stats.averages.knowledge,
            state.stats.averages.skill,
            state.stats.averages.behavior,
            state.stats.averages.efficiency,
            state.stats.averages.satisfaction
          ],
          backgroundColor: 'rgba(139, 21, 56, 0.2)',
          borderColor: '#8B1538',
          borderWidth: 2,
          pointBackgroundColor: '#8B1538'
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { r: { min: 0, max: 5, ticks: { stepSize: 1 } } }
      }
    });
  }

  // Knowledge detail chart
  const knoEl = document.getElementById('knowledgeChart');
  if (knoEl && state.rawData.self.length > 0) {
    const labels = ['พรบ.จัดซื้อจัดจ้าง', 'ระเบียบคลัง', 'วิธีจัดซื้อ', 'e-GP', 'บริหารพัสดุ', 'ป.ป.ช.', 'ป้องกันทุจริต'];
    const keys = ['k1','k2','k3','k4','k5','k6','k7'];
    const scores = keys.map(k => {
      const nums = state.rawData.self.map(r => Number(r[k])).filter(n => !isNaN(n));
      return nums.length ? +(nums.reduce((s,n) => s+n, 0) / nums.length).toFixed(2) : 0;
    });
    charts.knowledge = new Chart(knoEl, {
      type: 'bar',
      data: {
        labels,
        datasets: [{ label: 'คะแนนเฉลี่ย', data: scores, backgroundColor: '#059669', borderRadius: 4 }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { min: 0, max: 5 } }
      }
    });
  }
}

// ============ Components ============

function LoginPage() {
  return `
    <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-primary-600 p-6 fade-in">
      <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
          <div class="inline-flex w-16 h-16 rounded-full bg-primary-600 items-center justify-center mb-4">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          </div>
          <h1 class="font-serif text-2xl text-slate-900">Admin Dashboard</h1>
          <p class="text-sm text-slate-500 mt-1">ระบบประเมินผลการฝึกอบรม</p>
          <p class="text-xs text-slate-400 mt-2">สำนักการคลัง กรุงเทพมหานคร</p>
        </div>

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Admin Key</label>
            <input id="adminKey" type="password" placeholder="กรอกรหัสที่ตั้งไว้ใน Apps Script"
              onkeydown="if(event.key==='Enter') login()"
              class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:border-primary-600 focus:ring-2 focus:ring-primary-600/10 outline-none"/>
          </div>

          ${state.error ? `<div class="p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">${state.error}</div>` : ''}

          <button onclick="login()" ${state.loading?'disabled':''} class="w-full py-3 bg-primary-600 text-white rounded-lg hover:bg-primary-700 disabled:opacity-40 flex items-center justify-center gap-2">
            ${state.loading ? `
              <div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> กำลังเข้าสู่ระบบ...
            ` : 'เข้าสู่ระบบ'}
          </button>
        </div>

        <div class="mt-6 pt-6 border-t border-slate-100 text-xs text-slate-400 text-center">
          รหัส Admin Key ตั้งได้จาก Google Sheets > เมนู "ระบบประเมินผล" > "ตั้งรหัส Admin Key"
        </div>
      </div>
    </div>
  `;
}

function Dashboard() {
  const s = state.stats;
  if (!s) return '<div class="p-8">กำลังโหลด...</div>';

  const target = 848;
  const responseRate = ((s.total_self / target) * 100).toFixed(1);

  const kpiBg = (val) => val >= 80 ? 'from-emerald-500 to-emerald-600' : val >= 60 ? 'from-amber-500 to-amber-600' : 'from-rose-500 to-rose-600';

  return `
    <div class="min-h-screen bg-slate-50">
      <!-- Header -->
      <div class="bg-slate-900 text-white">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
          <div>
            <div class="text-xs opacity-60 tracking-wider">ADMIN DASHBOARD</div>
            <div class="font-serif text-lg">ระบบวิเคราะห์ผลการประเมิน</div>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="refreshData()" ${state.loading?'disabled':''} class="px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm flex items-center gap-1.5">
              <svg class="w-4 h-4 ${state.loading?'animate-spin':''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
              รีเฟรช
            </button>
            <button onclick="setState({authenticated: false, adminKey: ''})" class="px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">
              ออกจากระบบ
            </button>
          </div>
        </div>
      </div>

      <div class="max-w-7xl mx-auto px-6 py-8">
        <!-- KPI Cards -->
        <div class="grid md:grid-cols-4 gap-4 mb-8">
          <div class="bg-white rounded-xl p-5 border border-slate-100">
            <div class="text-xs text-slate-500 mb-1">ผู้ตอบแบบประเมินตนเอง</div>
            <div class="font-serif text-3xl text-slate-900">${s.total_self.toLocaleString()}</div>
            <div class="text-xs text-slate-500 mt-1">จาก ${target} คน (${responseRate}%)</div>
            <div class="mt-2 h-1.5 bg-slate-100 rounded-full overflow-hidden">
              <div class="h-full bg-primary-600" style="width: ${Math.min(100, responseRate)}%"></div>
            </div>
          </div>
          <div class="bg-white rounded-xl p-5 border border-slate-100">
            <div class="text-xs text-slate-500 mb-1">หัวหน้าประเมิน</div>
            <div class="font-serif text-3xl text-slate-900">${s.total_supervisor.toLocaleString()}</div>
            <div class="text-xs text-slate-500 mt-1">รายการ</div>
          </div>
          <div class="bg-gradient-to-br ${kpiBg(s.kpi_output)} rounded-xl p-5 text-white">
            <div class="text-xs opacity-80 mb-1">KPI ผลผลิต (เป้า ๘๐%)</div>
            <div class="font-serif text-3xl">${s.kpi_output}%</div>
            <div class="text-xs opacity-80 mt-1">${s.kpi_output >= 80 ? '✓ บรรลุเป้าหมาย' : 'ยังไม่บรรลุ'}</div>
          </div>
          <div class="bg-gradient-to-br ${kpiBg(s.kpi_outcome)} rounded-xl p-5 text-white">
            <div class="text-xs opacity-80 mb-1">KPI ผลลัพธ์ (เป้า ๘๐%)</div>
            <div class="font-serif text-3xl">${s.kpi_outcome}%</div>
            <div class="text-xs opacity-80 mt-1">${s.kpi_outcome >= 80 ? '✓ บรรลุเป้าหมาย' : 'ยังไม่บรรลุ'}</div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="bg-white rounded-xl border border-slate-100 overflow-hidden">
          <div class="border-b border-slate-100 flex">
            ${[
              { id: 'overview', t: 'ภาพรวม' },
              { id: 'detailed', t: 'วิเคราะห์รายมิติ' },
              { id: 'responses', t: 'รายการตอบ' }
            ].map(t => `
              <button onclick="changeTab('${t.id}')" class="px-6 py-4 text-sm border-b-2 ${state.tab===t.id?'border-primary-600 text-primary-600':'border-transparent text-slate-500'}">${t.t}</button>
            `).join('')}
          </div>

          <div class="p-6">
            ${state.tab === 'overview' ? `
              <div class="grid md:grid-cols-2 gap-6">
                <div>
                  <h3 class="font-serif text-lg mb-4">จำนวนผู้ตอบแยกรุ่น</h3>
                  <div style="height: 300px"><canvas id="batchChart"></canvas></div>
                </div>
                <div>
                  <h3 class="font-serif text-lg mb-4">คะแนนเฉลี่ยแยกมิติ (เต็ม ๕)</h3>
                  <div style="height: 300px"><canvas id="radarChart"></canvas></div>
                </div>
              </div>
            ` : state.tab === 'detailed' ? `
              <div>
                <h3 class="font-serif text-lg mb-4">คะแนนเฉลี่ยรายข้อ - มิติความรู้</h3>
                <div style="height: 300px"><canvas id="knowledgeChart"></canvas></div>

                <div class="grid md:grid-cols-2 gap-6 mt-8">
                  <div class="bg-emerald-50 border border-emerald-200 rounded-lg p-5">
                    <div class="text-xs text-emerald-700 mb-1">จุดแข็ง (คะแนนสูงสุด)</div>
                    <div class="font-serif text-lg text-slate-900">${findMax(s.averages)}</div>
                  </div>
                  <div class="bg-rose-50 border border-rose-200 rounded-lg p-5">
                    <div class="text-xs text-rose-700 mb-1">ควรปรับปรุง (คะแนนต่ำสุด)</div>
                    <div class="font-serif text-lg text-slate-900">${findMin(s.averages)}</div>
                  </div>
                </div>
              </div>
            ` : `
              <div class="flex justify-between items-center mb-4">
                <div class="text-sm text-slate-600">
                  Self: ${state.rawData.self.length} | Supervisor: ${state.rawData.supervisor.length} | Satisfaction: ${state.rawData.satisfaction.length}
                </div>
                <div class="flex gap-2">
                  <button onclick="exportCSV('self')" class="px-3 py-1.5 bg-primary-600 text-white rounded text-xs">CSV: ตนเอง</button>
                  <button onclick="exportCSV('supervisor')" class="px-3 py-1.5 bg-amber-600 text-white rounded text-xs">CSV: หัวหน้า</button>
                  <button onclick="exportCSV('satisfaction')" class="px-3 py-1.5 bg-emerald-600 text-white rounded text-xs">CSV: ความพึงพอใจ</button>
                </div>
              </div>
              <div class="overflow-x-auto">
                <table class="w-full text-sm">
                  <thead class="bg-slate-50 text-xs uppercase tracking-wider text-slate-600">
                    <tr>
                      <th class="px-4 py-3 text-left">วันที่</th>
                      <th class="px-4 py-3 text-left">ชื่อ</th>
                      <th class="px-4 py-3 text-left">สังกัด</th>
                      <th class="px-4 py-3 text-left">รุ่น</th>
                      <th class="px-4 py-3 text-right">คะแนนรวม</th>
                      <th class="px-4 py-3 text-center">ผ่าน</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-slate-100">
                    ${state.rawData.self.slice(0, 50).map(r => `
                      <tr class="hover:bg-slate-50">
                        <td class="px-4 py-2 text-xs text-slate-500">${new Date(r.timestamp).toLocaleDateString('th-TH')}</td>
                        <td class="px-4 py-2">${r.fullName||'-'}</td>
                        <td class="px-4 py-2 text-slate-600">${r.department||'-'}</td>
                        <td class="px-4 py-2 text-slate-600">${r.trainingBatch||'-'}</td>
                        <td class="px-4 py-2 text-right font-medium">${Number(r.overall_avg||0).toFixed(2)}</td>
                        <td class="px-4 py-2 text-center">
                          <span class="px-2 py-0.5 rounded text-xs ${r.pass_kpi==='ผ่าน'?'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-700'}">${r.pass_kpi||'-'}</span>
                        </td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
                ${state.rawData.self.length === 0 ? '<div class="text-center py-12 text-slate-400">ยังไม่มีข้อมูล</div>' : ''}
                ${state.rawData.self.length > 50 ? `<div class="text-center py-4 text-xs text-slate-400">แสดง 50 รายการแรก จากทั้งหมด ${state.rawData.self.length} รายการ (ดาวน์โหลด CSV เพื่อดูทั้งหมด)</div>` : ''}
              </div>
            `}
          </div>
        </div>
      </div>
    </div>
  `;
}

function findMax(avgs) {
  const items = [
    { k: 'ความรู้', v: avgs.knowledge },
    { k: 'ทักษะ', v: avgs.skill },
    { k: 'พฤติกรรม', v: avgs.behavior },
    { k: 'ประสิทธิภาพ', v: avgs.efficiency },
    { k: 'ความพึงพอใจ', v: avgs.satisfaction }
  ];
  const max = items.reduce((a, b) => (a.v > b.v) ? a : b);
  return `${max.k} (${max.v})`;
}

function findMin(avgs) {
  const items = [
    { k: 'ความรู้', v: avgs.knowledge },
    { k: 'ทักษะ', v: avgs.skill },
    { k: 'พฤติกรรม', v: avgs.behavior },
    { k: 'ประสิทธิภาพ', v: avgs.efficiency },
    { k: 'ความพึงพอใจ', v: avgs.satisfaction }
  ].filter(i => i.v > 0);
  if (items.length === 0) return 'ยังไม่มีข้อมูล';
  const min = items.reduce((a, b) => (a.v < b.v) ? a : b);
  return `${min.k} (${min.v})`;
}

function render() {
  document.getElementById('app').innerHTML = state.authenticated ? Dashboard() : LoginPage();
}

render();
</script>

</body>
</html>
