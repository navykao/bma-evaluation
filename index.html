  const BATCHES = ['รุ่นที่ 1', 'รุ่นที่ 2', 'รุ่นที่ 3', 'รุ่นที่ 4', 'รุ่นที่ 5'];
  const COURSES = [
    { value: 'หัวหน้าเจ้าหน้าที่', batches: ['รุ่นที่ 1'] },

<div id="app"></div>

<script>
// ============================================================
// State Management
// ============================================================
const state = {
  page: 'landing',
  formData: {},
  step: 1,
  loading: false,
  error: null,
  availableBatches: [],
  submittedCount: 0
};

// -------------------------------------------------------
// setState: ใช้สำหรับเปลี่ยนหน้า / step เท่านั้น (full re-render)
// ไม่ถูกเรียกเมื่อพิมพ์ใน input → ไม่กระพริบ
// -------------------------------------------------------
function setState(updates) {
  Object.assign(state, updates);
  render();
}

function navigate(page) {
  Object.assign(state, { page, step: 1, formData: {}, error: null, availableBatches: [] });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// updateFieldFromInput — เก็บค่าใน state แต่ไม่ re-render
// อัพเดทเฉพาะปุ่ม Next/Submit แทน
// ============================================================
function updateFieldFromInput(key, value) {
  state.formData[key] = value;
  _updateNavButtons();
}

// อัพเดทปุ่ม Next/Submit โดยไม่ render ใหม่
function _updateNavButtons() {
  const btn = document.getElementById('nextBtn');
  if (!btn) return;
  const ok = canNextGlobal();
  btn.disabled = !ok;
  btn.style.opacity = ok ? '1' : '0.4';
  btn.style.cursor  = ok ? 'pointer' : 'not-allowed';
}

// canNextGlobal — ตรวจสอบ field ที่ถูกต้องสำหรับแต่ละ page/step
function canNextGlobal() {
  const d    = state.formData;
  const step = state.step;
  const page = state.page;

  if (page === 'self') {
    // บังคับเฉพาะ: ชื่อ, สังกัดสำนัก, หลักสูตร (รุ่นไม่บังคับ)
    if (step === 1) return !!(d.fullName && d.department && d.course);
    if (step === 2) return ['k1','k2','k3','k4'].every(k => d[k]);
    if (step === 3) return !!(d.a1);
    if (step === 4) return true;
  }
  if (page === 'supervisor') {
    // ไม่บังคับอะไรทั้งนั้น — ผ่านได้เลย
    if (step === 1) return true;
    if (step === 2) return !!(d.k1 && d.k2 && d.k3 && d.k4 && d.k5);
    if (step === 3) return !!(d.b1 && d.b2);
    if (step === 4) return true;
  }
  if (page === 'satisfaction') {
    for (let i = 1; i <= 8; i++) { if (!d['s' + i]) return false; }
    return true;
  }
  return true;
}

// อัพเดทรุ่นตามหลักสูตรที่เลือก
function updateBatchOptions() {
  const course     = state.formData.course || '';
  const courseData = COURSES.find(c => c.value === course);
  if (courseData) {
    state.availableBatches = courseData.batches;
    if (state.formData.trainingBatch && !courseData.batches.includes(state.formData.trainingBatch)) {
      state.formData.trainingBatch = '';
    }
  } else {
    state.availableBatches = [];
  }
  // re-render เฉพาะ select รุ่น ไม่ render ทั้งหน้า
  const batchSelect = document.getElementById('batchSelect');
  const batchWarn   = document.getElementById('batchWarn');
  if (batchSelect) {
    batchSelect.disabled = !course;
    batchSelect.innerHTML = '<option value="">-- เลือกรุ่น --</option>' +
      state.availableBatches.map(b =>
        '<option value="' + b + '" ' + (state.formData.trainingBatch === b ? 'selected' : '') + '>' + b + '</option>'
      ).join('');
  }
  if (batchWarn) {
    batchWarn.style.display = course ? 'none' : '';
  }
  _updateNavButtons();
}

// ============================================================
// API Client
// ============================================================
async function submitForm(type, data) {
  setState({ loading: true, error: null });
  try {
    // ✅ แก้ไข 1: spread ...data ออกมาระดับเดียวกัน (ไม่ซ้อน)
    const payload = {
      type,
      ...data,
      timestamp: new Date().toISOString()
    };
    // ✅ แก้ไข 2: เอา mode:'no-cors' ออก และตรวจ response จริง
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    const result = await response.json();
    if (result.status !== 'success') throw new Error(result.message);
    // บันทึก backup ลง localStorage
    _saveToLocalStorage(type, data);
    setState({ loading: false, page: 'success', submittedCount: state.submittedCount + 1 });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (err) {
    console.error('Submission error:', err);
    setState({
      loading: false,
      error: 'ไม่สามารถส่งข้อมูลได้: ' + err.message
    });
  }
}

function _saveToLocalStorage(type, data) {
  try {
    // เก็บเฉพาะ 20 รายการล่าสุด เพื่อไม่ให้ storage เต็ม
    const allKeys = Object.keys(localStorage).filter(k => k.startsWith('evaluation_'));
    if (allKeys.length >= 20) {
      allKeys.sort().slice(0, allKeys.length - 19).forEach(k => localStorage.removeItem(k));
    }
    localStorage.setItem('evaluation_' + type + '_' + Date.now(), JSON.stringify({ type, data, timestamp: new Date().toISOString() }));
  } catch (e) {
    console.warn('Cannot save to localStorage:', e);
  }
}

// ============================================================
// Helper Functions
// ============================================================
function formatThaiDate() {
  const now = new Date();
  const thaiMonths = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
                      'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  return now.getDate() + ' ' + thaiMonths[now.getMonth()] + ' ' + (now.getFullYear() + 543);
}

// อัพเดท charCount แบบ live โดยไม่ re-render
function updateCharCount(key, el, counterId, minLen) {
  const val = el.value;
  state.formData[key] = val;
  const counter = document.getElementById(counterId);
  if (counter) {
    counter.textContent = val.length;
    counter.className = 'font-semibold ' + (val.length >= minLen ? 'text-emerald-600' : 'text-slate-600');
  }
  const label = document.getElementById(counterId + '_label');
  if (label) {
    label.textContent = val.length >= minLen ? '✓ ครบตามเกณฑ์' : '⚠ กรุณากรอกอย่างน้อย ' + minLen + ' ตัวอักษร';
    label.className = 'text-xs ' + (val.length >= minLen ? 'text-emerald-600' : 'text-amber-600');
  }
  _updateNavButtons();
}

function ProgressBar(current, total) {
  const pct = Math.round((current / total) * 100);
  return `
    <div class="mb-8">
      <div class="flex justify-between items-center mb-3">
        <span class="text-sm font-medium text-slate-700">ขั้นตอนที่ ${current} จาก ${total}</span>
        <span class="text-sm text-slate-500">${pct}% เสร็จสิ้น</span>
      </div>
      <div class="w-full bg-slate-200 rounded-full h-2 overflow-hidden">
        <div class="progress-bar bg-gradient-to-r from-primary-600 to-primary-500 h-full rounded-full" style="width:${pct}%"></div>
      </div>
    </div>
  `;
}

// RatingScale — Full Width Card (5 คอลัมน์เต็มหน้า)
// extraCb = ชื่อฟังก์ชัน JS เพิ่มเติมที่จะเรียกหลัง updateFieldFromInput (optional)
function RatingScale(key, value, extraCb) {
  const opts = [
    { v:1, t:'1', sub:'น้อยที่สุด' },
    { v:2, t:'2', sub:'น้อย' },
    { v:3, t:'3', sub:'ปานกลาง' },
    { v:4, t:'4', sub:'มาก' },
    { v:5, t:'5', sub:'มากที่สุด' }
  ];
  const cb = extraCb ? ' ' + extraCb + '();' : '';
  let html = '<div class="rating-grid">';
  for (const o of opts) {
    html += '<label class="rating-card">' +
      '<input type="radio" name="' + key + '" value="' + o.v + '"' +
      (value == o.v ? ' checked' : '') +
      ' onchange="updateFieldFromInput(\'' + key + '\', this.value);' + cb + '"/>' +
      '<div class="rating-card-inner">' +
        '<span class="rating-num">' + o.t + '</span>' +
        '<span class="rating-sub">' + o.sub + '</span>' +
      '</div>' +
    '</label>';
  }
  html += '</div>';
  return html;
}

// ============================================================
function SelfAssessment() {
  const d    = state.formData;
  const step = state.step;

  function canNext() {
    if (step === 1) return !!(d.fullName && d.department && d.course);
    if (step === 2) return ['k1','k2','k3','k4'].every(k => d[k]);
    if (step === 3) return !!(d.a1);
    if (step === 4) return true;
  }

  let content = '';

  if (step === 1) {
    content = Step1Fields(d);

  } else if (step === 2) {
    const qs = [
      { id:'k1', num:'1', text:'ความรู้ความเข้าใจเกี่ยวกับระเบียบกระทรวงการคลังว่าด้วยการจัดซื้อจัดจ้างและการบริหารพัสดุภาครัฐ พ.ศ. ๒๕๖๐' },
      { id:'k2', num:'2', text:'ท่านได้รับฟังการปฏิบัติจากหน่วยงานอื่นและนำมาปรับใช้ในการทำงานของตนเอง' },
      { id:'k3', num:'3', text:'ท่านได้เรียนรู้วิธีการจัดซื้อจัดจ้าง และข้อควรระวังต่างๆ มากขึ้น' },
      { id:'k4', num:'4', text:'ท่านได้เรียนรู้อำนาจหน้าที่และมาตรการป้องกันการทุจริตของ สำนักงาน ป.ป.ช.' }
    ];
    content = `
      <div class="space-y-5">
        <div class="bg-blue-50 border-l-4 border-blue-500 p-2 rounded">
          <p class="text-sm text-blue-900">
            <strong>คำชี้แจง:</strong> กรุณาประเมินระดับความรู้ความเข้าใจของท่านหลังฝึกอบรมโดยการให้คะแนน 
            ( 1 = น้อยที่สุด, 5 = มากที่สุด )

          <div class="question-card bg-white border border-gray-200 rounded-xl p-6 shadow-sm">

        <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 mt-1">

    const options = ['นำมาใช้ทั้งหมด','นำมาใช้ค่อนข้างมาก','นำมาใช้เฉพาะงานที่รับผิดชอบ','นำมาใช้น้อยมาก','ยังไม่เคยนำมาใช้เลย'];

function SupervisorAssessment() {
  const d    = state.formData;
  const step = state.step;

  function canNext() {
    if (step === 1) return true; // ไม่บังคับ
    if (step === 2) return !!(d.k1 && d.k2 && d.k3 && d.k4 && d.k5);
    if (step === 3) return !!(d.b1 && d.b2);
    if (step === 4) return true; // ไม่บังคับ
  }

  let content = '';

  // ---- Step 1: 2 ช่องข้อมูล ไม่บังคับ ----
  if (step === 1) {
    content = `
      <div class="space-y-6">
        <div class="bg-blue-50 border-l-4 border-blue-400 p-2 rounded-lg">
         <p class="text-xs text-red-800">เจ้าหน้าที่ = หัวหน้างาน/หัวหน้าฝ่าย/ข้าราชการที่อาวุโสกว่าผู้อบรม เป็นผู้ประเมินแทนหน่วยงาน</p>
         <p class="text-xs text-red-800">หัวหน้าเจ้าหน้าที่ = ข้าราชการเทียบเท่า หรือ ผบ.ผช. เป็นผู้ประเมินแทนหน่วยงาน (พิจารณาตามความเหมาะสม)</p>
        </div>
        <div>
          <label class="block text-base font-medium text-gray-700 mb-2">หน่วยงาน</label>
          <input type="text" value="${d.supDepartment || ''}"
            oninput="updateFieldFromInput('supDepartment', this.value)"
            placeholder="สำนัก/สำนักงานเขต/อื่นๆ"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none placeholder:text-xm text-base"/>
        </div>
        <div>
          <label class="block text-base font-medium text-gray-700 mb-2">สังกัด</label>
          <input type="text" value="${d.supDivision || ''}"
            oninput="updateFieldFromInput('supDivision', this.value)"

        </div>

  // ---- Step 2: ประเมินคะแนน 5 ข้อ + หมายเหตุ ----
  } else if (step === 2) {
    const items = [
      { k:'k1', label:'1. ความรู้ความเข้าใจเกี่ยวกับระเบียบ ขั้นตอนการปฏิบัติงานหลังการฝึกอบรม' },
      { k:'k2', label:'2. สามารถนำความรู้ไปประยุกต์ใช้ในการปฏิบัติงาน' },
      { k:'k3', label:'3. การพัฒนาทักษะในการปฏิบัติงานหลังการอบรม' },
      { k:'k4', label:'4. ความตั้งใจและความกระตือรือร้นในการปฏิบัติงานหลังผ่านการฝึกอบรม' },
      { k:'k5', label:'5. การนำแนวทางปฏิบัติที่ถูกต้องไปปรับใช้กับงานจัดซื้อจัดจ้างในหน่วยงาน' }
    ];
    content = `

       <div class="space-y-5">
        ${items.map(it => `
          <div class="question-card p-6 rounded-xl border border-slate-200 shadow-sm">
            <label class="question-title block text-slate-800 mb-3">${it.label}</label>

  // ---- Step 3: ประเมินพฤติกรรม แบบให้คะแนน 2 ข้อ ----

      <h2 class="text-xl font-serif font-semibold text-slate-900 mb-2">การประเมินพฤติกรรมและการนำไปใช้</h2>

      <div class="space-y-5">
        ${behavItems.map(it => `
          <div class="question-card p-6 rounded-xl border border-slate-200 shadow-sm">
            <label class="question-title block text-slate-800 mb-3">${it.label}</label>
            ${RatingScale(it.k, d[it.k] || 0)}
          </div>`).join('')}
      </div>`;

  // ---- Step 4: ความคิดเห็นและข้อเสนอแนะ ไม่บังคับ ----

      <div>
        <label class="block text-xl font-medium text-slate-800 mb-2">ความคิดเห็นและข้อเสนอแนะ <span class="text-gray-400">(ถ้ามี)</span></label>
        <textarea rows="6"
          oninput="updateFieldFromInput('overallComment', this.value)"

          placeholder="กรุณาระบุความคิดเห็น หากมีข้อเสนอแนะ "
        >${d.overallComment || ''}</textarea>
      </div>`;
  }

  const navigation = `
    <div class="flex justify-between mt-10 pt-6 border-t border-slate-100">
      ${step === 1 ? `
        <button onclick="navigate('landing')"
          class="btn-animated px-6 py-3 border-2 border-gray-400 bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-lg flex items-center gap-2 shadow-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          หน้าหลัก
        </button>` : `
        <button onclick="setState({step: ${step - 1}})"
          class="btn-animated px-6 py-3 border-2 border-gray-400 bg-gray-100 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg flex items-center gap-2">

          ${!canNext() ? 'disabled' : ''}

          class="btn-animated px-6 py-3 bg-primary-600 text-white rounded-lg hover:bg-primary-700 flex items-center gap-2 shadow-lg">

        </div>
      </div>
    </div>`;
}

                <div class="spinner w-4 h-4 border-2 border-white border-t-transparent rounded-full"></div>
                <span>กำลังส่ง...</span>` : `
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                <span class="whitespace-nowrap">ส่งแบบประเมิน</span>`}
            </button>
          </div>
        </div>
      </div>
    </div>`;
}

// อัพเดทปุ่ม submit ของ SatisfactionForm โดยไม่ re-render
function _updateSatisfactionBtn() {
  const btn = document.getElementById('satisfactionSubmitBtn');
  if (!btn) return;
  const ok = _canSatisfactionSubmit ? _canSatisfactionSubmit() : false;
  btn.disabled = !ok;
  btn.style.opacity = ok ? '1' : '0.4';
  btn.style.cursor  = ok ? 'pointer' : 'not-allowed';
}

// ============================================================
// Success Page
// ============================================================
function Success() {
  return `
    <div class="min-h-screen bg-gradient-to-br from-emerald-50 via-white to-emerald-50/30 flex items-center justify-center px-6 fade-in">
      <div class="max-w-lg text-center">
        <div class="inline-flex w-24 h-24 rounded-full bg-gradient-to-br from-emerald-400 to-emerald-600 items-center justify-center mb-6 shadow-2xl shadow-emerald-500/30">
          <svg class="w-14 h-14 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <h1 class="font-serif text-4xl text-slate-900 mb-4 font-semibold">ส่งแบบประเมินเรียบร้อย</h1>
        <div class="bg-white rounded-xl p-6 shadow-lg border border-slate-100 mb-6">
          <p class="text-slate-600 leading-relaxed mb-3">ขอขอบคุณที่ท่านให้ความร่วมมือในการประเมินผลการฝึกอบรม</p>
          <p class="text-sm text-slate-500 leading-relaxed">ข้อมูลของท่านจะถูกปกปิด และจะนำไปใช้ในการพัฒนาปรับปรุงการฝึกอบรมในโอกาสต่อไป</p>
        </div>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
          <button onclick="navigate('landing')"
            class="btn-animated px-6 py-3 border-2 border-gray-400 bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-lg flex items-center gap-2 shadow-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          หน้าหลัก
          </button>
        </div>
        <div class="mt-8 text-xs text-slate-400">
          <p>ส่งเมื่อ: ${formatThaiDate()}</p>
        </div>
      </div>
    </div>`;
}

// ============================================================
// Main Render
// ============================================================
function render() {
  const app = document.getElementById('app');
  switch (state.page) {
    case 'landing':      app.innerHTML = Landing(); break;
    case 'self':         app.innerHTML = SelfAssessment(); break;
    case 'supervisor':   app.innerHTML = SupervisorAssessment(); break;
    case 'satisfaction': app.innerHTML = SatisfactionForm(); break;
    case 'success':      app.innerHTML = Success(); break;
    default:             app.innerHTML = Landing();
  }
}

// Initial render
render();
</script>
</body>
