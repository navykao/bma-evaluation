<div id="app"></div>

<script>
// ============================================================
// State Management
// ============================================================
const state = {
  page: 'landing',
  formData: {},
  step: 1,
  loading: false,
  error: null,
  submittedCount: 0 // นับจำนวนการส่งแบบฟอร์ม
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function navigate(page) {
  setState({ page, step: 1, formData: {}, error: null });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// API Client
// ============================================================
async function submitForm(type, data) {
  setState({ loading: true, error: null });
  try {
    const payload = {
      type,
      data,
      timestamp: new Date().toISOString(),
      userAgent: navigator.userAgent
    };
    
    const response = await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    
    // บันทึกข้อมูลลง localStorage เป็น backup
    saveToLocalStorage(type, data);
    
    setState({ 
      loading: false, 
      page: 'success',
      submittedCount: state.submittedCount + 1
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (err) {
    console.error('Submission error:', err);
    setState({ 
      loading: false, 
      error: 'ไม่สามารถส่งข้อมูลได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต แล้วลองใหม่อีกครั้ง' 
    });
  }
}

// ============================================================
// Local Storage Functions (Backup)
// ============================================================
function saveToLocalStorage(type, data) {
  try {
    const key = `evaluation_${type}_${Date.now()}`;
    localStorage.setItem(key, JSON.stringify({
      type,
      data,
      timestamp: new Date().toISOString()
    }));
  } catch (e) {
    console.warn('Cannot save to localStorage:', e);
  }
}

// ============================================================
// Helper Functions
// ============================================================
function updateField(key, value) {
  state.formData[key] = value;
  render();
}

function updateFieldFromInput(key, value) {
  // เก็บค่าไว้ใน state โดยไม่ render ใหม่ (แก้ปัญหากระพริบ)
  state.formData[key] = value;
}
// ฟังก์ชันอัพเดทรุ่นตามหลักสูตร
function updateBatchOptions() {
  const course = state.formData.course || '';
  const courseData = COURSES.find(c => c.value === course);
  
  if (courseData) {
    state.availableBatches = courseData.batches;
    // ถ้ารุ่นที่เลือกไว้ไม่อยู่ในตัวเลือกใหม่ ให้ล้างค่า
    if (state.formData.trainingBatch && !courseData.batches.includes(state.formData.trainingBatch)) {
      state.formData.trainingBatch = '';
    }
  } else {
    state.availableBatches = [];
  }
  
  render();
}

function formatThaiDate() {
  const now = new Date();
  const thaiMonths = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
                      'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
  const day = now.getDate();
  const month = thaiMonths[now.getMonth()];
  const year = now.getFullYear() + 543;
  return `${day} ${month} ${year}`;
}

      <label class="block text-sm font-medium text-gray-700 mb-2">
        สังกัดฝ่าย/กลุ่ม <span class="text-red-500">*</span>
      </label>
      <input
        type="text"

        oninput="updateFieldFromInput('division', this.value)"

    <!-- หลักสูตร (Dropdown) -->

      <label class="block text-sm font-medium text-gray-700 mb-2">
        หลักสูตรที่เข้ารับการอบรม <span class="text-red-500">*</span>
      </label>
      <select 
        onchange="updateFieldFromInput('course', this.value); updateBatchOptions();"

        <option value="">-- เลือกหลักสูตร --</option>

          <option value="${c.value}" ${d.course === c.value ? 'selected' : ''}>${c.value}</option>

    <!-- รุ่นที่ (ขึ้นกับหลักสูตร) -->

      <label class="block text-sm font-medium text-gray-700 mb-2">
        รุ่นที่เข้ารับการอบรม <span class="text-red-500">*</span>
      </label>
      <select 
        onchange="updateFieldFromInput('trainingBatch', this.value)"

        <option value="">-- เลือกรุ่น --</option>
        ${(state.availableBatches || []).map(b => `
          <option value="${b}" ${d.trainingBatch === b ? 'selected' : ''}>${b}</option>
        `).join('')}
      </select>
      ${!d.course ? '<p class="text-xs text-amber-600 mt-1">⚠ กรุณาเลือกหลักสูตรก่อน</p>' : ''}
    </div>
  </div>
`;
  else if (step === 2) {
    const items = [
      { k: 'k1', label: '๑. ความรู้ความเข้าใจในเนื้อหาการฝึกอบรม' },
      { k: 'k2', label: '๒. ความสามารถในการนำความรู้ไปประยุกต์ใช้ในการปฏิบัติงาน' },
      { k: 'k3', label: '๓. การพัฒนาทักษะในการปฏิบัติงานหลังการอบรม' }
    ];
    content = `
      <h2 class="text-2xl font-serif font-semibold text-slate-900 mb-2">การประเมินความรู้และทักษะ</h2>
      <p class="text-slate-600 mb-6">ประเมินความรู้และทักษะของผู้เข้ารับการอบรมหลังจากเสร็จสิ้นการฝึกอบรม</p>
      <div class="space-y-6">
        ${items.map(it => `
          <div class="p-6 bg-slate-50 rounded-xl border border-slate-200">
            <label class="block text-slate-800 font-medium mb-4">${it.label}</label>
            ${RatingScale(it.k, d[it.k] || 0)}
          </div>
        `).join('')}
      </div>
    `;
  }
  
  else if (step === 3) {
    content = `
      <h2 class="text-2xl font-serif font-semibold text-slate-900 mb-2">พฤติกรรมและผลการปฏิบัติงาน</h2>
      <p class="text-slate-600 mb-6">อธิบายการเปลี่ยนแปลงพฤติกรรมและผลการปฏิบัติงาน</p>
      <div>
        <label class="block text-sm font-medium text-slate-800 mb-2">
          ๓. ท่านสังเกตเห็นการเปลี่ยนแปลงพฤติกรรมหรือผลการปฏิบัติงานของผู้เข้ารับการอบรมอย่างไร
          <span class="text-primary-600">(กรุณาอธิบายอย่างน้อย ๕๐ ตัวอักษร)</span>
          <span class="text-red-500">*</span>
        </label>
        <textarea 
          rows="6" 
          oninput="updateFieldFromInput('behavior', this.value); document.getElementById('charCount').textContent = this.value.length;" 
          class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 focus:ring-2 focus:ring-primary-100 outline-none resize-none"
          placeholder="ตัวอย่าง: ผู้เข้ารับการอบรมมีความมั่นใจในการจัดทำเอกสารจัดซื้อจัดจ้างมากขึ้น สามารถ..."
        >${d.behavior||''}</textarea>
        <div class="flex justify-between items-center mt-2">
          <div class="text-xs ${(d.behavior||'').length >= 50 ? 'text-emerald-600' : 'text-amber-600'}">
            ${(d.behavior||'').length >= 50 ? '✓ ครบตามเกณฑ์' : '⚠ กรุณากรอกอย่างน้อย ๕๐ ตัวอักษร'}
          </div>
          <div class="text-xs text-slate-400">
            <span id="charCount" class="font-semibold ${(d.behavior||'').length >= 50 ? 'text-emerald-600' : 'text-slate-600'}">${(d.behavior||'').length}</span> / 50 ตัวอักษร
          </div>
        </div>
      </div>
    `;
  }
  
  else if (step === 4) {
    content = `
      <h2 class="text-2xl font-serif font-semibold text-slate-900 mb-2">ความคิดเห็นและข้อเสนอแนะ</h2>
      <p class="text-slate-600 mb-6">ข้อเสนอแนะเพื่อการพัฒนา</p>
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-slate-800 mb-2">๔.๑ จุดเด่น/การพัฒนาที่ชัดเจนหลังผ่านการฝึกอบรม</label>
          <textarea 
            rows="3" 
            oninput="updateFieldFromInput('improvements', this.value)" 
            class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 focus:ring-2 focus:ring-primary-100 outline-none resize-none"
            placeholder="จุดเด่นที่สังเกตได้..."
          >${d.improvements||''}</textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-800 mb-2">๔.๒ หัวข้อที่ต้องการให้จัดฝึกอบรมเพิ่มเติมในรุ่นต่อไป</label>
          <textarea 
            rows="3" 
            oninput="updateFieldFromInput('furtherTraining', this.value)" 
            class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 focus:ring-2 focus:ring-primary-100 outline-none resize-none"
            placeholder="หัวข้อที่ควรเพิ่มเติม..."
          >${d.furtherTraining||''}</textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-800 mb-2">
            ๔.๓ ข้อคิดเห็นภาพรวมต่อการฝึกอบรม 
            <span class="text-primary-600">(อย่างน้อย ๒๐ ตัวอักษร)</span>
            <span class="text-red-500">*</span>
          </label>
          <textarea 
            rows="4" 
            oninput="updateFieldFromInput('overallComment', this.value); document.getElementById('charCount2').textContent = this.value.length;" 
            class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 focus:ring-2 focus:ring-primary-100 outline-none resize-none"
            placeholder="ความคิดเห็นและข้อเสนอแนะ..."
          >${d.overallComment||''}</textarea>
          <div class="flex justify-between items-center mt-2">
            <div class="text-xs ${(d.overallComment||'').length >= 20 ? 'text-emerald-600' : 'text-amber-600'}">
              ${(d.overallComment||'').length >= 20 ? '✓ ครบตามเกณฑ์' : '⚠ กรุณากรอกอย่างน้อย ๒๐ ตัวอักษร'}
            </div>
            <div class="text-xs text-slate-400">
              <span id="charCount2" class="font-semibold ${(d.overallComment||'').length >= 20 ? 'text-emerald-600' : 'text-slate-600'}">${(d.overallComment||'').length}</span> / 20 ตัวอักษร
            </div>
          </div>
        </div>
      </div>
    `;
  }

  const navigation = `
    <div class="flex justify-between mt-10 pt-6 border-t border-slate-100">
      ${step === 1 ? `
        <button 
          onclick="navigate('landing')" 
          class="px-6 py-3 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg flex items-center gap-2 transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          กลับหน้าหลัก
        </button>
      ` : `
        <button 
          onclick="setState({step: ${step-1}})" 
          class="px-6 py-3 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg flex items-center gap-2 transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          ย้อนกลับ
        </button>
      `}
      ${step < 4 ? `
        <button 
          onclick="${canNext() ? `setState({step: ${step+1}})` : ''}" 
          ${!canNext()?'disabled':''} 
          class="px-6 py-3 bg-primary-600 text-white rounded-lg hover:bg-primary-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 transition-colors shadow-lg hover:shadow-xl"
        >
          <span>ถัดไป</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      ` : `
        <button 
          onclick="${canNext() ? `submitForm('supervisor', state.formData)` : ''}" 
          ${!canNext()||state.loading?'disabled':''} 
          class="px-6 py-3 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 transition-colors shadow-lg hover:shadow-xl"
        >
          ${state.loading ? `
            <div class="spinner w-4 h-4 border-2 border-white border-t-transparent rounded-full"></div>
            <span>กำลังส่ง...</span>
          ` : `
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            <span>ส่งแบบประเมิน</span>
          `}
        </button>
      `}
    </div>
  `;

  return `
    <div class="min-h-screen bg-gradient-to-br from-slate-50 to-amber-50/20 fade-in">
      ${FormHeader('แบบประเมินโดยผู้บังคับบัญชา', 'สำหรับหน่วยงานหรือผู้บังคับบัญชาโดยตรง · หลังการฝึกอบรม 3 เดือน')}
      <div class="max-w-4xl mx-auto px-6 py-10">
        ${ProgressBar(step, 4)}
        <div class="bg-white rounded-2xl shadow-lg border border-slate-100 p-8 md:p-10">
          ${content}
          ${state.error ? `
            <div class="mt-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm flex items-start gap-3">
              <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
              </svg>
              <span>${state.error}</span>
            </div>
          ` : ''}
          ${navigation}
        </div>
      </div>
    </div>
  `;
}

function SatisfactionForm() {
  const { step, formData: d } = state;

  const questions = [
    '๑. เนื้อหาการฝึกอบรมมีความเหมาะสม',
    '๒. วิทยากรมีความรู้ความสามารถ',
    '๓. การบรรยายของวิทยากรทำให้เข้าใจได้ง่าย',
    '๔. เอกสารประกอบการฝึกอบรมมีความครบถ้วน',
    '๕. ระยะเวลาในการฝึกอบรมมีความเหมาะสม',
    '๖. สถานที่ฝึกอบรมมีความเหมาะสม',
    '๗. การบริการและอำนวยความสะดวกเป็นอย่างดี',
    '๘. ความพึงพอใจโดยภาพรวมต่อการฝึกอบรม'
  ];

  const renderRatingScale = (questionNum) => {
    const ratings = [
      { value: 1, label: '๑', sublabel: 'น้อยที่สุด' },
      { value: 2, label: '๒', sublabel: '' },
      { value: 3, label: '๓', sublabel: 'ปานกลาง' },
      { value: 4, label: '๔', sublabel: '' },
      { value: 5, label: '๕', sublabel: 'มากที่สุด' }
    ];

    return `
      <div class="flex justify-center gap-3 flex-wrap">
        ${ratings.map(r => `
          <label class="flex flex-col items-center gap-1 cursor-pointer group">
            <input 
              type="radio" 
              name="s${questionNum}" 
              value="${r.value}"
              ${d['s'+questionNum] == r.value ? 'checked' : ''}
              onchange="updateFieldFromInput('s${questionNum}', this.value)"
              class="w-5 h-5 text-green-600 cursor-pointer"
            />
            <div class="text-center">
              <div class="text-sm font-semibold">${r.label}</div>
              ${r.sublabel ? `<div class="text-xs text-gray-500">${r.sublabel}</div>` : ''}
            </div>
          </label>
        `).join('')}
      </div>
    `;
  };

  const content = `
    <div class="space-y-8">
      <!-- ส่วนรุ่นที่ -->
      <div class="bg-gray-50 p-6 rounded-lg">
        <label class="block text-sm font-medium text-gray-700 mb-2">
          รุ่นที่เข้ารับการอบรม <span class="text-red-500">*</span>
        </label>
        <select 
          onchange="updateFieldFromInput('batch', this.value)"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
        >
          <option value="">-- เลือกรุ่น --</option>
          ${BATCHES.map(b => `
            <option value="${b}" ${d.batch === b ? 'selected' : ''}>${b}</option>
          `).join('')}
        </select>
      </div>

      <!-- คำถามทั้งหมด -->
      ${questions.map((q, idx) => `
        <div class="bg-white p-6 rounded-lg border border-gray-200">
          <div class="font-medium text-gray-900 mb-4">${q}</div>
          ${renderRatingScale(idx + 1)}
        </div>
      `).join('')}

      <!-- ข้อเสนอแนะ -->
      <div class="bg-gray-50 p-6 rounded-lg">
        <label class="block text-sm font-medium text-gray-700 mb-2">
          ข้อเสนอแนะ <span class="text-gray-400">(ถ้ามี)</span>
        </label>
        <textarea
          value="${d.suggestions || ''}"
          oninput="updateFieldFromInput('suggestions', this.value)"
          placeholder="กรุณาระบุข้อเสนอแนะเพิ่มเติม (ไม่บังคับ)"
          rows="4"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
        ></textarea>
      </div>
    </div>
  `;

  // Validation
  const canSubmit = () => {
    if (!d.batch) return false;
    for (let i = 1; i <= 8; i++) {
      if (!d['s' + i]) return false;
    }
    return true;
  };

  return `
    <div class="min-h-screen bg-gradient-to-br from-slate-50 to-amber-50/20 fade-in">
      ${FormHeader('แบบประเมินความพึงพอใจ', 'สำหรับผู้เข้ารับการอบรม')}
      <div class="max-w-4xl mx-auto px-6 py-10">
        <div class="bg-white rounded-2xl shadow-xl p-8">
          ${content}
          
          <!-- Navigation Buttons -->
          <div class="flex justify-between mt-10 pt-6 border-t border-gray-100">
            <button 
              onclick="navigate('landing')" 
              class="px-6 py-3 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg flex items-center gap-2 transition-colors"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
              </svg>
              กลับหน้าหลัก
            </button>
            
            <button 
              onclick="${canSubmit() ? `submitForm('satisfaction', state.formData)` : ''}" 
              ${!canSubmit() || state.loading ? 'disabled' : ''} 
              class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 transition-colors shadow-lg hover:shadow-xl"
            >
              ${state.loading ? `
                <div class="spinner w-4 h-4 border-2 border-white border-t-transparent rounded-full"></div>
                <span>กำลังส่ง...</span>
              ` : `
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
                <span>ส่งแบบประเมิน</span>
              `}
            </button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function render() {
  const app = document.getElementById('app');
  switch (state.page) {
    case 'landing': app.innerHTML = Landing(); break;
    case 'self': app.innerHTML = SelfAssessment(); break;
    case 'supervisor': app.innerHTML = SupervisorAssessment(); break;
    case 'satisfaction': app.innerHTML = SatisfactionForm(); break;
    case 'success': app.innerHTML = Success(); break;
    default: app.innerHTML = Landing();
  }
}

// Initial render
render();
</script>

</body>
</html>
