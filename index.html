// ============================================================
// State Management (แบบง่าย ไม่ใช้ framework)
// ============================================================
const state = {
  page: 'landing',
  formData: {},
  step: 1,
  loading: false,
  error: null
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function navigate(page) {
  setState({ page, step: 1, formData: {}, error: null });
  window.scrollTo(0, 0);
}

// ============================================================
// API Client
// ============================================================
async function submitForm(type, data) {
  setState({ loading: true, error: null });
  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors', // Apps Script ไม่ support CORS preflight
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ type, data })
    });
    // no-cors ไม่อ่าน response ได้ ถือว่าสำเร็จถ้าไม่ throw
    setState({ loading: false, page: 'success' });
    window.scrollTo(0, 0);
  } catch (err) {
    setState({ loading: false, error: 'ไม่สามารถส่งข้อมูลได้ กรุณาลองใหม่อีกครั้ง' });
  }
}

// ============ Rating Scale Component ============
function RatingScale(key, value, labels = ['น้อยที่สุด', 'น้อย', 'ปานกลาง', 'มาก', 'มากที่สุด']) {
  return `
    <div class="grid grid-cols-5 gap-2">
      ${[1,2,3,4,5].map(n => `
        <button type="button" onclick="updateField('${key}', ${n})" class="py-3 px-2 rounded-lg border-2 text-center ${
          value === n ? 'border-primary-600 bg-primary-600 text-white shadow-md' : 'border-slate-200 bg-white text-slate-600 hover:border-slate-400'
        }">
          <div class="font-serif text-xl">${n}</div>
          <div class="text-[10px] mt-0.5 opacity-90">${labels[n-1]}</div>
        </button>
      `).join('')}
    </div>
  `;
}

function updateField(key, value) {
  state.formData[key] = value;
  render();
}

function updateFieldFromInput(key, value) {
  state.formData[key] = value;
  // ไม่ต้อง render ทุกครั้งเพื่อไม่ให้ input กระโดด
}

function ProgressBar(current, total) {
  return `
    <div class="mb-8">
      <div class="flex justify-between text-xs text-slate-500 mb-2">
        <span>ส่วนที่ ${current} จาก ${total}</span>
        <span>${Math.round(current/total*100)}%</span>
      </div>
      <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden">
        <div class="h-full bg-gradient-to-r from-primary-600 to-primary-500" style="width: ${current/total*100}%"></div>
      </div>
    </div>
  `;
}

      {k:'p4', t:'๒.๔ การแก้ปัญหาและการตัดสินใจในงานจัดซื้อจัดจ้างดีขึ้น'},
      {k:'p5', t:'๒.๕ การพึ่งตนเองในการปฏิบัติงาน (ต้องขอคำปรึกษาน้อยลง)'},
      {k:'p6', t:'๒.๖ ความตระหนักรู้ในเรื่องการป้องกันการทุจริตและความเสี่ยงเพิ่มขึ้น'}
    ];
    content = `
      <div class="flex items-center gap-3 mb-6 pb-4 border-b border-slate-100">
        <div class="w-10 h-10 rounded-lg bg-emerald-100 text-emerald-700 flex items-center justify-center font-serif text-xl">๒</div>
        <div>
          <h2 class="font-serif text-xl text-slate-900">การประเมินการปฏิบัติงาน</h2>
          <p class="text-xs text-slate-500">เปรียบเทียบก่อนและหลังผู้ใต้บังคับบัญชาผ่านการฝึกอบรม</p>
        </div>
      </div>
      <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-6 text-xs text-amber-900">
        <strong>เกณฑ์:</strong> ๑ = น้อยที่สุด / ไม่เปลี่ยนแปลง | ๕ = มากที่สุด / ดีขึ้นอย่างชัดเจน
      </div>
      <div class="space-y-6">
        ${items.map(it => `<div><label class="block text-sm text-slate-800 mb-3">${it.t}</label>${RatingScale(it.k, d[it.k] || 0)}</div>`).join('')}
      </div>
    `;
  } else if (step === 3) {
    const items = [
      {k:'r1', t:'๓.๑ ประสิทธิภาพของการดำเนินงานจัดซื้อจัดจ้างในหน่วยงานเพิ่มขึ้น'},
      {k:'r2', t:'๓.๒ ระยะเวลาในกระบวนการจัดซื้อจัดจ้างลดลง', labels:['ไม่ลดลง','ลดลงน้อย','ลดลงปานกลาง','ลดลงมาก','ลดลงมากที่สุด']},
      {k:'r3', t:'๓.๓ ข้อผิดพลาด/การทักท้วงจากผู้ตรวจสอบลดลง', labels:['ไม่ลดลง','ลดลงน้อย','ลดลงปานกลาง','ลดลงมาก','ลดลงมากที่สุด']},
      {k:'r4', t:'๓.๔ ผู้ใต้บังคับบัญชาสามารถถ่ายทอดความรู้ให้เพื่อนร่วมงานได้'}
    ];
    content = `
      <div class="flex items-center gap-3 mb-6 pb-4 border-b border-slate-100">
        <div class="w-10 h-10 rounded-lg bg-rose-100 text-rose-700 flex items-center justify-center font-serif text-xl">๓</div>
        <div><h2 class="font-serif text-xl text-slate-900">ผลกระทบต่อหน่วยงานและการประเมินโดยรวม</h2></div>
      </div>
      <div class="space-y-6 mb-8">
        ${items.map(it => `<div><label class="block text-sm text-slate-800 mb-3">${it.t}</label>${RatingScale(it.k, d[it.k] || 0, it.labels)}</div>`).join('')}
      </div>
      <div class="bg-gradient-to-br from-primary-50 to-amber-50 border-2 border-primary-200 rounded-xl p-6">
        <label class="block text-base font-medium text-slate-900 mb-4">
          ๓.๕ การประเมินภาพรวม: ผู้ใต้บังคับบัญชาสามารถนำความรู้ไปใช้ปฏิบัติงานได้อย่างถูกต้องในระดับใด
        </label>
        ${RatingScale('overallRating', d.overallRating || 0)}
        <p class="text-xs text-slate-500 mt-3">* คะแนนนี้ใช้คำนวณ KPI ระดับผลลัพธ์ (ระดับปานกลางขึ้นไป = คะแนน ๓ ขึ้นไป)</p>
      </div>
    `;
  } else {
    content = `
      <div class="flex items-center gap-3 mb-6 pb-4 border-b border-slate-100">
        <div class="w-10 h-10 rounded-lg bg-blue-100 text-blue-700 flex items-center justify-center font-serif text-xl">๔</div>
        <div><h2 class="font-serif text-xl text-slate-900">ข้อคิดเห็นและข้อเสนอแนะ</h2></div>
      </div>
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-slate-800 mb-2">๔.๑ จุดเด่น/การพัฒนาที่ชัดเจนหลังผ่านการฝึกอบรม</label>
          <textarea rows="3" oninput="updateFieldFromInput('improvements', this.value)" class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 outline-none resize-none">${d.improvements||''}</textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-800 mb-2">๔.๒ หัวข้อที่ต้องการให้จัดฝึกอบรมเพิ่มเติมในรุ่นต่อไป</label>
          <textarea rows="3" oninput="updateFieldFromInput('furtherTraining', this.value)" class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 outline-none resize-none">${d.furtherTraining||''}</textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-800 mb-2">๔.๓ ข้อคิดเห็นภาพรวมต่อการฝึกอบรม (อย่างน้อย ๒๐ ตัวอักษร) <span class="text-red-500">*</span></label>
          <textarea rows="4" oninput="updateFieldFromInput('overallComment', this.value); document.getElementById('charCount2').textContent = this.value.length;" class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 outline-none resize-none">${d.overallComment||''}</textarea>
          <div class="text-xs text-slate-400 mt-1 text-right"><span id="charCount2">${(d.overallComment||'').length}</span> ตัวอักษร</div>
        </div>
      </div>
    `;
  }

  const navigation = `
    <div class="flex justify-between mt-10 pt-6 border-t border-slate-100">
      <button onclick="${step > 1 ? `setState({step: ${step-1}})` : ''}" ${step===1?'disabled':''} class="px-5 py-2.5 text-slate-600 disabled:opacity-30 hover:text-slate-900 flex items-center gap-1.5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        ย้อนกลับ
      </button>
      ${step < 4 ? `
        <button onclick="${canNext() ? `setState({step: ${step+1}})` : ''}" ${!canNext()?'disabled':''} class="px-6 py-2.5 bg-primary-600 text-white rounded-lg hover:bg-primary-700 disabled:opacity-40 flex items-center gap-1.5">
          ถัดไป
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
      ` : `
        <button onclick="${canNext() ? `submitForm('supervisor', state.formData)` : ''}" ${!canNext()||state.loading?'disabled':''} class="px-6 py-2.5 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 disabled:opacity-40 flex items-center gap-1.5">
          ${state.loading ? `<div class="spinner w-4 h-4 border-2 border-white border-t-transparent rounded-full"></div> กำลังส่ง...` : `
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            ส่งแบบประเมิน
          `}
        </button>
      `}
    </div>
  `;

  return `
    <div class="min-h-screen bg-gradient-to-br from-slate-50 to-amber-50/20 fade-in">
      ${FormHeader('แบบประเมินโดยผู้บังคับบัญชา', 'สำหรับหัวหน้างาน/ผู้บังคับบัญชาโดยตรง · หลังการฝึกอบรม ๓ เดือน')}
      <div class="max-w-4xl mx-auto px-6 py-10">
        ${ProgressBar(step, 4)}
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 md:p-10">
          ${content}
          ${state.error ? `<div class="mt-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">${state.error}</div>` : ''}
          ${navigation}
        </div>
      </div>
    </div>
  `;
}

// ============ Satisfaction Form ============
function SatisfactionForm() {
  const d = state.formData;
  const items = [
    {k:'s1', t:'๑. เนื้อหาของหลักสูตรมีความเหมาะสมและตรงความต้องการ'},
    {k:'s2', t:'๒. วิทยากรมีความรู้ความเชี่ยวชาญในเนื้อหาที่บรรยาย'},
    {k:'s3', t:'๓. วิธีการบรรยายและการถ่ายทอดของวิทยากรมีความเข้าใจง่าย'},
    {k:'s4', t:'๔. เอกสารประกอบการอบรมมีความครบถ้วนและเข้าใจง่าย'},
    {k:'s5', t:'๕. ระยะเวลาในการอบรมมีความเหมาะสม'},
    {k:'s6', t:'๖. สถานที่จัดอบรมมีความเหมาะสม (โรงแรมเดอะ ทวิน ทาวเวอร์)'},
    {k:'s7', t:'๗. การบริการและการต้อนรับของเจ้าหน้าที่'},
    {k:'s8', t:'๘. ความพึงพอใจภาพรวมต่อการฝึกอบรม'}
  ];

  const canSubmit = d.fullName && d.department && d.batch && items.every(it => d[it.k]);

  return `
    <div class="min-h-screen bg-gradient-to-br from-slate-50 to-amber-50/20 fade-in">
      ${FormHeader('แบบประเมินความพึงพอใจต่อการฝึกอบรม', 'โครงการฝึกอบรมข้าราชการที่ปฏิบัติงานด้านการจัดซื้อจัดจ้างฯ')}
      <div class="max-w-4xl mx-auto px-6 py-10">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 md:p-10 space-y-8">
          <div class="grid md:grid-cols-3 gap-4">
            <input type="text" placeholder="ชื่อ-นามสกุล *" value="${d.fullName||''}" oninput="updateFieldFromInput('fullName', this.value)" class="px-4 py-2.5 border border-slate-200 rounded-lg focus:border-primary-600 outline-none"/>
            <input type="text" placeholder="สังกัด *" value="${d.department||''}" oninput="updateFieldFromInput('department', this.value)" class="px-4 py-2.5 border border-slate-200 rounded-lg focus:border-primary-600 outline-none"/>
            <select onchange="updateField('batch', this.value)" class="px-4 py-2.5 border border-slate-200 rounded-lg focus:border-primary-600 outline-none">
              <option value="">-- รุ่นที่ --</option>
              ${['รุ่นที่ ๑','รุ่นที่ ๒','รุ่นที่ ๓','รุ่นที่ ๔','รุ่นที่ ๕'].map(v => `<option ${d.batch===v?'selected':''}>${v}</option>`).join('')}
            </select>
          </div>
          <div class="space-y-6">
            ${items.map(it => `<div><label class="block text-sm text-slate-800 mb-3">${it.t}</label>${RatingScale(it.k, d[it.k] || 0)}</div>`).join('')}
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-800 mb-2">สิ่งที่ท่านประทับใจมากที่สุด</label>
            <textarea rows="2" oninput="updateFieldFromInput('bestPart', this.value)" class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 outline-none resize-none">${d.bestPart||''}</textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-800 mb-2">สิ่งที่ควรปรับปรุง</label>
            <textarea rows="2" oninput="updateFieldFromInput('improvePart', this.value)" class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 outline-none resize-none">${d.improvePart||''}</textarea>
          </div>
          ${state.error ? `<div class="p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">${state.error}</div>` : ''}
          <div class="pt-6 border-t border-slate-100 flex justify-end">
            <button onclick="${canSubmit ? `submitForm('satisfaction', state.formData)` : ''}" ${!canSubmit||state.loading?'disabled':''} class="px-6 py-2.5 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 disabled:opacity-40 flex items-center gap-1.5">
              ${state.loading ? `<div class="spinner w-4 h-4 border-2 border-white border-t-transparent rounded-full"></div> กำลังส่ง...` : `
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                ส่งแบบประเมิน
              `}
            </button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function Success() {
  return `
    <div class="min-h-screen bg-gradient-to-br from-emerald-50 to-white flex items-center justify-center px-6 fade-in">
      <div class="max-w-md text-center">
        <div class="inline-flex w-20 h-20 rounded-full bg-emerald-100 items-center justify-center mb-6">
          <svg class="w-12 h-12 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <h1 class="font-serif text-3xl text-slate-900 mb-3">ส่งแบบประเมินเรียบร้อย</h1>
        <p class="text-slate-600 mb-8 leading-relaxed">
          ขอขอบคุณที่ท่านให้ความร่วมมือในการประเมินผลการฝึกอบรม<br/>
          ข้อมูลของท่านจะถูกนำไปใช้ในการพัฒนาการฝึกอบรมในรุ่นต่อไป
        </p>
        <button onclick="navigate('landing')" class="px-6 py-2.5 bg-primary-600 text-white rounded-lg hover:bg-primary-700">
          กลับหน้าหลัก
        </button>
      </div>
    </div>
  `;
}

// ============================================================
// Main Render
// ============================================================
function render() {
  const app = document.getElementById('app');
  switch (state.page) {
    case 'landing': app.innerHTML = Landing(); break;
    case 'self': app.innerHTML = SelfAssessment(); break;
    case 'supervisor': app.innerHTML = SupervisorAssessment(); break;
    case 'satisfaction': app.innerHTML = SatisfactionForm(); break;
    case 'success': app.innerHTML = Success(); break;
    default: app.innerHTML = Landing();
  }
}

// Initial render
render();
</script>

</body>
</html>
