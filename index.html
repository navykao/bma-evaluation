<script>
// ============================================================
// State Management
// ============================================================
const state = {
  page: 'landing',
  formData: {},
  step: 1,
  loading: false,
  error: null,
  submittedCount: 0 // นับจำนวนการส่งแบบฟอร์ม
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function navigate(page) {
  setState({ page, step: 1, formData: {}, error: null });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// API Client
// ============================================================
async function submitForm(type, data) {
  setState({ loading: true, error: null });
  try {
    const payload = {
      type,
      data,
      timestamp: new Date().toISOString(),
      userAgent: navigator.userAgent
    };
    
    const response = await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    
    // บันทึกข้อมูลลง localStorage เป็น backup
    saveToLocalStorage(type, data);
    
    setState({ 
      loading: false, 
      page: 'success',
      submittedCount: state.submittedCount + 1
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (err) {
    console.error('Submission error:', err);
    setState({ 
      loading: false, 
      error: 'ไม่สามารถส่งข้อมูลได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต แล้วลองใหม่อีกครั้ง' 
    });
  }
}

// ============================================================
// Local Storage Functions (Backup)
// ============================================================
function saveToLocalStorage(type, data) {
  try {
    const key = `evaluation_${type}_${Date.now()}`;
    localStorage.setItem(key, JSON.stringify({
      type,
      data,
      timestamp: new Date().toISOString()
    }));
  } catch (e) {
    console.warn('Cannot save to localStorage:', e);
  }
}

// ============================================================
// Helper Functions

function updateField(key, value) {
  state.formData[key] = value;
  render();
}

function updateFieldFromInput(key, value) {
  // เก็บค่าไว้ใน state โดยไม่ render ใหม่ (แก้ปัญหากระพริบ)
  state.formData[key] = value;
}

function formatThaiDate() {
  const now = new Date();
  const thaiMonths = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
                      'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
  const day = now.getDate();
  const month = thaiMonths[now.getMonth()];
  const year = now.getFullYear() + 543;
  return `${day} ${month} ${year}`;
}

function SelfAssessment() {
  const d = state.formData;
  const step = state.step;

  function canNext() {
    if (step === 1) {
      return d.fullName && d.idpHash && d.position && d.level && d.department && d.division && d.email && d.phone && d.course && d.batch;

    if (step === 2) {
      return ['k1_before','k1_after','k2_before','k2_after','k3_before','k3_after'].every(k => d[k]);

    if (step === 3) {
      return d.application && d.application.length >= 50;

    if (step === 4) {

    }
    return false;

  let content = '';

    content = `

      <div class="grid md:grid-cols-2 gap-4">
        <input type="text" placeholder="ชื่อ-นามสกุล *" value="${d.fullName||''}" oninput="updateFieldFromInput('fullName', this.value)" class="px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 focus:ring-2 focus:ring-primary-100 outline-none"/>

        <input type="email" placeholder="อีเมล *" value="${d.email||''}" oninput="updateFieldFromInput('email', this.value)" class="px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 focus:ring-2 focus:ring-primary-100 outline-none"/>
        <input type="tel" placeholder="เบอร์โทรศัพท์ *" value="${d.phone||''}" oninput="updateFieldFromInput('phone', this.value)" class="px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 focus:ring-2 focus:ring-primary-100 outline-none"/>
        <input type="text" placeholder="หลักสูตรที่เข้ารับการอบรม *" value="${d.course||''}" oninput="updateFieldFromInput('course', this.value)" class="px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 focus:ring-2 focus:ring-primary-100 outline-none md:col-span-2"/>

      </div>
    `;

  else if (step === 2) {
    const items = [
      { k: 'k1', label: '๑. ความรู้เกี่ยวกับ พ.ร.บ. การจัดซื้อจัดจ้างและการบริหารพัสดุภาครัฐ พ.ศ. ๒๕๖๐' },
      { k: 'k2', label: '๒. ความรู้เกี่ยวกับระเบียบกระทรวงการคลังว่าด้วยการจัดซื้อจัดจ้างฯ พ.ศ. ๒๕๖๐' },

      <div class="space-y-8">
        ${items.map(it => `
          <div class="p-6 bg-slate-50 rounded-xl border border-slate-200">

            <div class="grid md:grid-cols-2 gap-6">
              <div>
                <div class="text-sm text-slate-600 mb-3 font-medium">ก่อนการอบรม</div>
                ${RatingScale(`${it.k}_before`, d[`${it.k}_before`] || 0)}
              </div>
              <div>
                <div class="text-sm text-slate-600 mb-3 font-medium">หลังการอบรม</div>

              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }
  
  else if (step === 3) {
    content = `
      <h2 class="text-2xl font-serif font-semibold text-slate-900 mb-2">การนำความรู้ไปใช้</h2>
      <p class="text-slate-600 mb-6">อธิบายการนำความรู้จากการอบรมไปประยุกต์ใช้ในการปฏิบัติงาน</p>
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-slate-800 mb-2">
            ๓. ท่านได้นำความรู้ที่ได้จากการฝึกอบรมไปประยุกต์ใช้ในการปฏิบัติงานอย่างไร

            <span class="text-red-500">*</span>
          </label>
          <textarea 
            rows="6" 
            oninput="updateFieldFromInput('application', this.value); document.getElementById('charCount').textContent = this.value.length;" 
            class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 focus:ring-2 focus:ring-primary-100 outline-none resize-none"
            placeholder="ตัวอย่าง: ได้นำความรู้เรื่อง... ไปปรับปรุงกระบวนการจัดซื้อจัดจ้าง โดย..."
          >${d.application||''}</textarea>
          <div class="flex justify-between items-center mt-2">
            <div class="text-xs ${(d.application||'').length >= 50 ? 'text-emerald-600' : 'text-amber-600'}">
              ${(d.application||'').length >= 50 ? '✓ ครบตามเกณฑ์' : '⚠ กรุณากรอกอย่างน้อย ๕๐ ตัวอักษร'}

            <div class="text-xs text-slate-400">
              <span id="charCount" class="font-semibold ${(d.application||'').length >= 50 ? 'text-emerald-600' : 'text-slate-600'}">${(d.application||'').length}</span> / 50 ตัวอักษร
            </div>
          </div>
        </div>
      </div>
    `;

  else if (step === 4) {
    content = `
      <h2 class="text-2xl font-serif font-semibold text-slate-900 mb-2">ความคิดเห็นและข้อเสนอแนะ</h2>
      <p class="text-slate-600 mb-6">แบ่งปันข้อคิดเห็นเพื่อพัฒนาการจัดอบรมในครั้งต่อไป</p>
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-slate-800 mb-2">๔.๑ จุดเด่น/การพัฒนาที่ชัดเจนหลังผ่านการฝึกอบรม</label>
          <textarea 
            rows="3" 
            oninput="updateFieldFromInput('improvements', this.value)" 
            class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 focus:ring-2 focus:ring-primary-100 outline-none resize-none"

          >${d.improvements||''}</textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-800 mb-2">๔.๒ หัวข้อที่ต้องการให้จัดฝึกอบรมเพิ่มเติมในรุ่นต่อไป</label>
          <textarea 
            rows="3" 
            oninput="updateFieldFromInput('furtherTraining', this.value)" 
            class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:border-primary-600 focus:ring-2 focus:ring-primary-100 outline-none resize-none"
            placeholder="ตัวอย่าง: การจัดทำแผนการจัดซื้อจัดจ้างประจำปี..."
          >${d.furtherTraining||''}</textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-800 mb-2">
            ๔.๓ ข้อคิดเห็นภาพรวมต่อการฝึกอบรม 
            <span class="text-primary-600">(อย่างน้อย ๒๐ ตัวอักษร)</span>
            <span class="text-red-500">*</span>
          </label>
          <textarea 
            rows="4" 
            oninput="updateFieldFromInput('overallComment', this.value); document.getElementById('charCount2').textContent = this.value.length;"

          </div>
        </div>
      </div>
    `;
  }

  const navigation = `
    <div class="flex justify-between mt-10 pt-6 border-t border-slate-100">
      ${step === 1 ? `
        <button 
          onclick="navigate('landing')" 
          class="px-6 py-3 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg flex items-center gap-2 transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          กลับหน้าหลัก
        </button>
      ` : `
        <button 
          onclick="setState({step: ${step-1}})" 
          class="px-6 py-3 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg flex items-center gap-2 transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          ย้อนกลับ
        </button>
      `}
      ${step < 4 ? `
        <button 
          onclick="${canNext() ? `setState({step: ${step+1}})` : ''}" 
          ${!canNext()?'disabled':''} 
          class="px-6 py-3 bg-primary-600 text-white rounded-lg hover:bg-primary-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 transition-colors shadow-lg hover:shadow-xl"

          <span>ถัดไป</span>

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      ` : `
        <button 
          onclick="${canNext() ? `submitForm('self', state.formData)` : ''}" 
          ${!canNext()||state.loading?'disabled':''} 
          class="px-6 py-3 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 transition-colors shadow-lg hover:shadow-xl"
        >
          ${state.loading ? `
            <div class="spinner w-4 h-4 border-2 border-white border-t-transparent rounded-full"></div>
            <span>กำลังส่ง...</span>
          ` : `
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            <span>ส่งแบบประเมิน</span>
          `}
        </button>
      `}
    </div>
  `;

  return `
    <div class="min-h-screen bg-gradient-to-br from-slate-50 to-amber-50/20 fade-in">
      ${FormHeader('แบบประเมินตนเอง', 'สำหรับผู้เข้ารับการอบรม · หลังการฝึกอบรม 3 เดือน')}
      <div class="max-w-4xl mx-auto px-6 py-10">
        ${ProgressBar(step, 4)}
        <div class="bg-white rounded-2xl shadow-lg border border-slate-100 p-8 md:p-10">
          ${content}
          ${state.error ? `
            <div class="mt-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm flex items-start gap-3">
              <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">

              </svg>
              <span>${state.error}</span>
            </div>
          ` : ''}
          ${navigation}
        </div>
      </div>
    </div>
  `;
}

            ข้อมูลของท่านจะถูกเก็บรักษาเป็นความลับ และจะนำไปใช้ในการพัฒนาและปรับปรุงการจัดฝึกอบรมในรุ่นต่อไป
          </p>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 justify-center">
          <button 
            onclick="navigate('landing')" 
            class="px-8 py-3.5 bg-gradient-to-r from-primary-600 to-primary-500 text-white rounded-xl hover:shadow-xl shadow-lg shadow-primary-900/20 flex items-center justify-center gap-2 hover-lift font-medium"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            กลับหน้าหลัก
          </button>
          
          <button 
            onclick="window.print()" 
            class="px-8 py-3.5 bg-white border-2 border-slate-300 text-slate-700 rounded-xl hover:bg-slate-50 flex items-center justify-center gap-2 hover-lift font-medium"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
            </svg>
            พิมพ์หน้านี้
          </button>
        </div>

        <div class="mt-8 text-xs text-slate-400">
          <p>ส่งเมื่อ: ${formatThaiDate()}</p>
        </div>
      </div>
    </div>
  `;
}

// ============================================================
// Main Render
// ============================================================
function render() {
  const app = document.getElementById('app');
  switch (state.page) {
    case 'landing': app.innerHTML = Landing(); break;
    case 'self': app.innerHTML = SelfAssessment(); break;
    case 'supervisor': app.innerHTML = SupervisorAssessment(); break;
    case 'satisfaction': app.innerHTML = SatisfactionForm(); break;
    case 'success': app.innerHTML = Success(); break;
    default: app.innerHTML = Landing();
  }
}

// Initial render
render();
</script>
